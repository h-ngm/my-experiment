<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stroop Task - ストループ課題</title>

  <!-- jsPsych 7.3.4 コアCSS & JS の読み込み -->
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  
  <!-- 各種プラグインのCDN読み込み -->
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@1.2.1"></script>

  <style>
    /* 画面全体のリセットと仕様に基づく背景色・フォント設定 */
    html, body {
      background-color: #FFFFFF !important;
      color: #333333;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    /* 実験描画ターゲットを画面全体（100vw, 100vh）に広げる */
    #jspsych-target {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* jsPsychのコンテンツ表示領域を強制的に上下左右中央に配置する */
    .jspsych-display-element {
      background-color: #FFFFFF !important;
      width: 100% !important;
      height: 100% !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: center !important;
      align-items: center !important;
    }

    /* 教示テキストのスタイル（仕様：教示は 24px） */
    .instruction-text {
      font-size: 24px;
      line-height: 1.8;
      text-align: left;
      max-width: 850px;
      margin: 0 auto;
      padding: 20px;
    }

    .instruction-text ul {
      margin: 15px 0;
      padding-left: 40px;
    }

    /* 刺激テキストのスタイル（仕様：刺激は 60px、中央揃えを強化） */
    .stimulus-text {
      font-size: 60px;
      font-weight: bold;
      user-select: none;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      min-height: 100px;
    }

    /* フルスクリーン開始ボタンのスタイル */
    .jspsych-btn {
      font-size: 20px;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="jspsych-target"></div>

  <script>
    // jsPsychオブジェクトの初期化
    const jsPsych = initJsPsych({
      display_element: 'jspsych-target',
      // 実験終了時にデータをCSV形式で画面に直接表示
      on_finish: function() {
        jsPsych.data.displayData('csv');
      }
    });

    // 要因計画に基づく刺激定義（文字×色）と仮説検証に必要なデータの定義
    // 文字(word): "赤", "青", "緑"
    // 色(color): red, blue, green
    // 正答キー(correct_response)
    // 条件名(condition): congruent (一致) / incongruent (不一致)
    const base_stimuli = [
      // 一致条件 (Congruent)
      { word: "赤", color: "red", correct_response: "r", condition: "congruent" },
      { word: "青", color: "blue", correct_response: "b", condition: "congruent" },
      { word: "緑", color: "green", correct_response: "g", condition: "congruent" },
      // 不一致条件 (Incongruent)
      { word: "赤", color: "blue", correct_response: "b", condition: "incongruent" },
      { word: "赤", color: "green", correct_response: "g", condition: "incongruent" },
      { word: "青", color: "red", correct_response: "r", condition: "incongruent" },
      { word: "青", color: "green", correct_response: "g", condition: "incongruent" },
      { word: "緑", color: "red", correct_response: "r", condition: "incongruent" },
      { word: "緑", color: "blue", correct_response: "b", condition: "incongruent" }
    ];

    const timeline = [];

    // iframe内など、環境によってフルスクリーンが拒否される場合のエラーを回避する判定
    const isFullscreenSupported = !!(
      document.fullscreenEnabled ||
      document.webkitFullscreenEnabled ||
      document.mozFullScreenEnabled ||
      document.msFullscreenEnabled
    );

    // 1. 全画面化試行 (環境がサポートしている場合のみ追加)
    if (isFullscreenSupported) {
      const fullscreen_trial = {
        type: jsPsychFullscreen,
        fullscreen_mode: true,
        message: '<div style="font-size: 24px; margin-bottom: 20px;">実験を最適に実施するため、フルスクリーン（全画面）表示にします。</div>',
        button_label: "全画面表示を開始する"
      };
      timeline.push(fullscreen_trial);
    }

    // 2. 教示画面の設定 (教示サイズは 24px)
    const instruction_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="instruction-text">
          <p>これよりストループ課題を開始します。</p>
          <p>画面中央に、「赤」「青」「緑」のいずれかの漢字が、<strong>赤色・青色・緑色</strong>のいずれかで表示されます。</p>
          <p>文字の意味ではなく、<strong>文字の「色」</strong>をできるだけ早く、正確にキーボードで回答してください。</p>
          <br>
          <p><strong>【回答対応キー】</strong></p>
          <ul>
            <li><span style="color: red; font-weight: bold;">赤色</span>の文字が表示されたら ➔ <strong>'r'</strong> キー</li>
            <li><span style="color: blue; font-weight: bold;">青色</span>の文字が表示されたら ➔ <strong>'b'</strong> キー</li>
            <li><span style="color: green; font-weight: bold;">緑色</span>の文字が表示されたら ➔ <strong>'g'</strong> キー</li>
          </ul>
          <br>
          <p style="text-align: center;">準備ができたら、<strong>スペースキー</strong>を押して実験を開始してください。</p>
        </div>
      `,
      choices: [' '] // スペースキーのみ受け付ける
    };
    timeline.push(instruction_trial);

    // 3. メイン試行ループの設定
    const main_timeline = {
      timeline: [
        // a. 注視点 (+): 500ms 表示 (その後自動消去)
        {
          type: jsPsychHtmlKeyboardResponse,
          stimulus: '<div class="stimulus-text" style="color: #000000;">+</div>',
          choices: "NO_KEYS",
          trial_duration: 500 // 提示時間: 500ms
        },
        // b. 刺激提示
        {
          type: jsPsychHtmlKeyboardResponse,
          stimulus: function() {
            // タイムライン変数から「文字(word)」と「色(color)」を取り出しHTMLを生成
            const word = jsPsych.timelineVariable('word');
            const color = jsPsych.timelineVariable('color');
            return `<div class="stimulus-text" style="color: ${color};">${word}</div>`;
          },
          // 許容回答キー: 'r', 'b', 'g'
          choices: ['r', 'b', 'g'],
          
          // キー入力があるまで無限に表示 (デフォルト。明示的にnull指定)
          trial_duration: null,
          
          // c. 試行間隔 (ITI): 1000ms (刺激終了後、次の注視点までの空白時間)
          post_trial_gap: 1000,
          
          // 仮説検証に必要なメタデータ（文字、色、条件、正しいキー）をデータオブジェクトに格納
          data: {
            task: 'stroop',
            word: jsPsych.timelineVariable('word'),
            color: jsPsych.timelineVariable('color'),
            condition: jsPsych.timelineVariable('condition'),
            correct_response: jsPsych.timelineVariable('correct_response')
          },
          
          // 参加者の入力データを受け取り、正誤(correct)判定を行う
          on_finish: function(data) {
            // 入力されたキーと correct_response を比較して正否を記録
            data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
          }
        }
      ],
      // 全刺激候補から重複ありランダムサンプリングにより10試行を抽出
      timeline_variables: base_stimuli,
      sample: {
        type: 'with-replacement',
        size: 10
      }
    };
    timeline.push(main_timeline);

    // 実験の実行
    jsPsych.run(timeline);
  </script>
</body>
</html>
