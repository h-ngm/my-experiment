<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jsPsych Circle Experiment (CSS)</title>
    <!-- Load jsPsych v7 from CDN -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <!-- Load html-keyboard-response plugin -->
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <style>
        /* Specification 1: Set background color to grey */
        body {
            background-color: #808080;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Specification 2: CSS for a 100px red circle */
        .red-circle {
            width: 100px;
            height: 100px;
            background-color: red;
            border-radius: 50%; /* Makes it a circle */
            margin: 0 auto;
        }

        .instruction-text {
            margin-top: 20px;
            font-family: sans-serif;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="jspsych-target"></div>
    <script>
        /**
         * jsPsych Experiment
         * Displays a red circle using HTML/CSS and waits for a spacebar press.
         */

        // 1. Initialize jsPsych
        const jsPsych = initJsPsych({
            display_element: 'jspsych-target',
            on_finish: function() {
                // Show final data (optional)
                jsPsych.data.displayData();
            }
        });

        // 2. Create timeline
        const timeline = [];

        // 3. Circle Trial
        const circle_trial = {
            type: jsPsychHtmlKeyboardResponse,
            // Specification 2: Drawing the circle with DIV and CSS
            stimulus: `
                <div class="red-circle"></div>
                <div class="instruction-text">スペースキーを押してください</div>
            `,
            // Specification 3: Wait for space key
            choices: [' '], 
            data: {
                task: 'circle_display'
            }
        };
        timeline.push(circle_trial);

        // 4. Conclusion message
        const end_msg = {
            type: jsPsychHtmlKeyboardResponse,
            // Specification 4: Show end message
            stimulus: `
                <div style="font-family: sans-serif;">
                    <h1>終了</h1>
                    <p>キーが押されました。実験を終了します。</p>
                </div>
            `,
            choices: "NO_KEYS",
            trial_duration: 3000
        };
        timeline.push(end_msg);

        // Run the experiment
        jsPsych.run(timeline);
    </script>
</body>
</html>
