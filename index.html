<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6; /* 薄いグレー */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            color: #1f2937;
            margin-bottom: 2rem;
            font-weight: bold;
        }

        .btn-start {
            background-color: #3b82f6; /* 青いボタン */
            color: white;
            padding: 1rem 2.5rem;
            font-size: 1.25rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .btn-start:hover {
            background-color: #2563eb;
        }

        .btn-start:active {
            transform: scale(0.98);
        }

        /* カスタムアラート（alert()の代わり） */
        #custom-alert {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            min-width: 300px;
            text-align: center;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>心理学実験室へようこそ</h1>
        <button class="btn-start" id="startBtn">実験を開始する</button>
    </div>

    <!-- カスタムアラート UI -->
    <div id="overlay"></div>
    <div id="custom-alert">
        <p style="font-size: 1.5rem; margin-bottom: 1.5rem;">Hello World!</p>
        <button onclick="closeAlert()" style="background: #ef4444; color: white; padding: 0.5rem 1.5rem; border-radius: 0.25rem;">閉じる</button>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const alertBox = document.getElementById('custom-alert');
        const overlay = document.getElementById('overlay');

        // 実験開始ボタンのクリックイベント
        startBtn.addEventListener('click', () => {
            showAlert();
        });

        // カスタムアラートを表示する関数
        function showAlert() {
            alertBox.style.display = 'block';
            overlay.style.display = 'block';
        }

        // カスタムアラートを閉じる関数
        function closeAlert() {
            alertBox.style.display = 'none';
            overlay.style.display = 'none';
        }

        // 背景クリックでも閉じられるように設定
        overlay.addEventListener('click', closeAlert);
    </script>
</body>
</html>
